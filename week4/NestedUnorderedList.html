<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nested Unordered List</title>
</head>
<body>
  <h1>Nested Unordered List</h1>
  <h4>List of Available Snacks</h4>

  <ul>
    <li>
      Pastries
      <ul>
        <li>Chocolate</li>
        <li>Pineapple</li>
        <li>Vanilla</li>
        <li>Red Velvet</li>
      </ul>
    </li>
    <li>
      Soft Drinks
      <ul>
        <li>Coke</li>
        <li>Pepsi</li>
        <li>Monster</li>
        <li>Dr Pepper</li>
      </ul>
    </li>
    <li>Lemon Sherbet</li>
    <li>Spiced Pineapple</li>
  </ul>
</body>
</html>
